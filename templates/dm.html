{% extends 'base.html' %}
{% block title %}DM — ChatApp{% endblock %}

{% block extra_css %}
<style>
    .app-container { display: flex; height: 100vh; overflow: hidden; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .chat-header {
        padding: 16px 24px;
        background: #1a1a2e;
        border-bottom: 1px solid #2a2a3d;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chat-header h3 { font-size: 18px; }
    .dm-user {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .dm-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        overflow: hidden;
        background: linear-gradient(135deg, var(--accent), #3ba7d6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #042133;
        font-weight: 800;
        font-size: 16px;
        flex-shrink: 0;
    }
    .dm-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .messages-container {
        flex: 1; overflow-y: auto;
        padding: 20px 24px;
        display: flex; flex-direction: column; gap: 12px;
    }
    .message-bubble {
        max-width: 65%; padding: 10px 14px;
        border-radius: 12px; font-size: 14px; line-height: 1.5;
    }
    .message-bubble.received {
        background: #2a2a3d; align-self: flex-start;
        border-bottom-left-radius: 4px;
    }
    .message-bubble.sent {
        background: #6c63ff; align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    .message-time {
        font-size: 10px; color: #888;
        margin-top: 4px; text-align: right;
    }
    .message-content {
        white-space: pre-wrap;
        word-break: break-word;
    }
    .message-attachment {
        margin-top: 8px;
    }
    .message-attachment img {
        max-width: 240px;
        max-height: 220px;
        border-radius: 12px;
        display: block;
    }
    .attachment-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #eef6ff;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
    }
    .chat-input-area {
        padding: 16px 24px; background: #1a1a2e;
        border-top: 1px solid #2a2a3d;
        display: flex; gap: 12px; align-items: center;
    }
    .chat-input-area input { flex: 1; }
    .attach-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1px solid #2a2a3d;
        background: rgba(255,255,255,0.04);
        color: var(--text-1);
        font-size: 18px;
        cursor: pointer;
    }
    .attachment-chip {
        margin: 10px 24px 0;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border-radius: 12px;
        background: rgba(255,255,255,0.04);
        border: 1px solid #2a2a3d;
        font-size: 13px;
    }
    .attachment-chip.show {
        display: flex;
    }
    .attachment-chip button {
        border: none;
        background: transparent;
        color: #ff8b8b;
        cursor: pointer;
        font-weight: 700;
    }
    .online-badge {
        font-size: 12px; padding: 3px 10px;
        border-radius: 20px; background: #2ed57320; color: #2ed573;
    }
    .offline-badge {
        font-size: 12px; padding: 3px 10px;
        border-radius: 20px; background: #88888820; color: #888;
    }
    .blocked-note {
        margin: 24px;
        padding: 16px 18px;
        border-radius: 14px;
        background: rgba(255, 71, 87, 0.1);
        border: 1px solid rgba(255, 71, 87, 0.22);
        color: #ffb3bb;
        font-size: 13px;
        display: none;
    }
    .chat-input-area.disabled {
        opacity: 0.55;
        pointer-events: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="app-container">
    <div class="chat-area">
        <div class="chat-header">
            <div class="dm-user">
                <div class="dm-avatar" id="dm-avatar">{{ other_username|first|upper }}</div>
                <h3 id="dm-title">{{ other_username }}</h3>
            </div>
            <span id="online-status" class="offline-badge">Offline</span>
        </div>

        <div class="messages-container" id="messages-container">
            <div style="text-align:center;color:#888;font-size:13px;padding:20px">
                Loading messages...
            </div>
        </div>
        <div class="blocked-note" id="blocked-note"></div>

        <div class="attachment-chip" id="attachment-chip">
            <span id="attachment-name"></span>
            <button type="button" onclick="clearSelectedAttachment()">Remove</button>
        </div>

        <div class="chat-input-area">
            <button class="attach-btn" type="button" onclick="pickAttachment()" title="Attach file">+</button>
            <input
                type="text"
                id="message-input"
                placeholder="Type a message..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>
<input type="file" id="attachment-input" style="display:none" onchange="handleAttachmentSelect(event)">
{% endblock %}

{% block extra_js %}
<script>
    let token = localStorage.getItem('access_token');
    const username = localStorage.getItem('username');
    const otherUsername = '{{ other_username }}';
    let latestMessageId = 0;
    let dmSocket = null;
    let dmReconnectHandle = null;
    let selectedAttachment = null;
    let canMessage = true;

    function setMessagingState(allowed, message = '') {
        canMessage = allowed;
        const blockedNote = document.getElementById('blocked-note');
        const inputArea = document.querySelector('.chat-input-area');
        blockedNote.style.display = allowed ? 'none' : 'block';
        blockedNote.textContent = message;
        inputArea.classList.toggle('disabled', !allowed);
    }

    function renderHeaderAvatar(user) {
        const avatar = document.getElementById('dm-avatar');
        const profilePictureUrl = user?.profile_picture_url;
        if (profilePictureUrl) {
            avatar.innerHTML = `<img src="${profilePictureUrl}" alt="${user.username}">`;
            return;
        }
        avatar.textContent = (user?.username || otherUsername)[0].toUpperCase();
    }

    async function loadOtherUserProfile() {
        const response = await window.authFetch(`/api/users/search/?q=${encodeURIComponent(otherUsername)}`);
        if (!response.ok) return;
        const users = await response.json();
        const otherUser = users.find(user => user.username === otherUsername);
        if (!otherUser) return;
        renderHeaderAvatar(otherUser);
        updateOnlineStatus(otherUser.is_online);
    }

    async function loadMessages() {
        const response = await window.authFetch(`/api/dm/${otherUsername}/`);
        if (response.status === 403) {
            const data = await response.json();
            setMessagingState(false, data.error || 'Messages are allowed only after the request is accepted.');
            const container = document.getElementById('messages-container');
            container.innerHTML = `
                <div style="text-align:center;color:#888;font-size:13px;padding:40px">
                    Chat will open after the request is accepted.
                </div>`;
            return;
        }

        const messages = await response.json();
        setMessagingState(true);
        const container = document.getElementById('messages-container');

        if (messages.length === 0) {
            latestMessageId = 0;
            container.innerHTML = `
                <div style="text-align:center;color:#888;font-size:13px;padding:40px">
                    No messages yet. Say hello to ${otherUsername}! 👋
                </div>`;
            return;
        }

        const newestMessageId = messages[messages.length - 1].id;

        if (!latestMessageId) {
            container.innerHTML = '';
            messages.forEach(msg => addMessage(msg));
            latestMessageId = newestMessageId;
            scrollToBottom();
        } else if (newestMessageId > latestMessageId) {
            const newMessages = messages.filter(msg => msg.id > latestMessageId);
            newMessages.forEach(msg => addMessage(msg));
            latestMessageId = newestMessageId;
            scrollToBottom();
        }

        if (!container.children.length) {
            container.innerHTML = '';
            messages.forEach(msg => addMessage(msg));
            latestMessageId = newestMessageId;
            scrollToBottom();
        }

        // Update online status
        const lastMsg = messages[messages.length - 1];
        const otherUser = lastMsg.sender.username === otherUsername
            ? lastMsg.sender : lastMsg.receiver;
        renderHeaderAvatar(otherUser);
        updateOnlineStatus(otherUser.is_online);
    }

    function connectDirectMessageSocket() {
        if (!token) return;

        if (dmReconnectHandle) {
            clearTimeout(dmReconnectHandle);
            dmReconnectHandle = null;
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        dmSocket = new WebSocket(
            `${wsProtocol}://${window.location.host}/ws/dm/?token=${encodeURIComponent(token)}`
        );

        dmSocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type !== 'direct_message' || !data.message) {
                return;
            }

            const message = data.message;
            const participants = [message.sender?.username, message.receiver?.username];
            if (!participants.includes(username) || !participants.includes(otherUsername)) {
                return;
            }

            const container = document.getElementById('messages-container');
            if (container.textContent.includes('No messages yet')) {
                container.innerHTML = '';
            }

            addMessage(message);
            latestMessageId = Math.max(latestMessageId, message.id || 0);
            scrollToBottom();
            updateOnlineStatus(true);
        };

        dmSocket.onclose = () => {
            dmSocket = null;
        };

        dmSocket.onerror = () => {
            if (dmSocket) {
                dmSocket.close();
            }
        };
    }

    async function sendMessage() {
        if (!canMessage) return;
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        if (!content && !selectedAttachment) return;

        let response;
        if (selectedAttachment) {
            const formData = new FormData();
            formData.append('content', content);
            formData.append('attachment', selectedAttachment);
            response = await window.authFetch(`/api/dm/${otherUsername}/`, {
                method: 'POST',
                body: formData
            });
        } else {
            response = await window.authFetch(`/api/dm/${otherUsername}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content })
            });
        }

        if (response.status === 403) {
            const data = await response.json();
            setMessagingState(false, data.error || 'Messages are allowed only after the request is accepted.');
            return;
        }

        if (response.ok) {
            const data = await response.json();
            const container = document.getElementById('messages-container');
            if (container.textContent.includes('No messages yet')) {
                container.innerHTML = '';
            }
            addMessage(data);
            latestMessageId = Math.max(latestMessageId, data.id || 0);
            scrollToBottom();
            input.value = '';
            clearSelectedAttachment();
            try {
                if (window.parent && typeof window.parent.refreshChatSidebar === 'function') {
                    window.parent.refreshChatSidebar();
                }
            } catch (err) {
                console.error('Could not refresh sidebar after DM send:', err);
            }
        }
    }

    function renderAttachment(message) {
        if (!message.attachment_url) return '';
        if (message.is_image) {
            return `
                <div class="message-attachment">
                    <a href="${message.attachment_url}" target="_blank" rel="noopener noreferrer">
                        <img src="${message.attachment_url}" alt="${message.attachment_name || 'Image'}">
                    </a>
                </div>
            `;
        }
        return `
            <div class="message-attachment">
                <a class="attachment-link" href="${message.attachment_url}" target="_blank" rel="noopener noreferrer">
                    <span>📄</span>
                    <span>${message.attachment_name || 'Download attachment'}</span>
                </a>
            </div>
        `;
    }

    function addMessage(message) {
        const messageId = message.id;
        const sender = message.sender.username;
        if (messageId && document.getElementById(`dm-message-${messageId}`)) {
            return;
        }

        const container = document.getElementById('messages-container');
        const isMine = sender === username;
        const time = new Date(message.timestamp).toLocaleTimeString(
            [], { hour: '2-digit', minute: '2-digit' }
        );
        const div = document.createElement('div');
        if (messageId) {
            div.id = `dm-message-${messageId}`;
        }
        div.className = `message-bubble ${isMine ? 'sent' : 'received'}`;
        div.innerHTML = `
            ${message.content ? `<div class="message-content">${message.content}</div>` : ''}
            ${renderAttachment(message)}
            <div class="message-time">${time}</div>
        `;
        container.appendChild(div);
    }

    function pickAttachment() {
        document.getElementById('attachment-input').click();
    }

    function handleAttachmentSelect(event) {
        selectedAttachment = event.target.files[0] || null;
        const chip = document.getElementById('attachment-chip');
        const name = document.getElementById('attachment-name');
        if (selectedAttachment) {
            name.textContent = selectedAttachment.name;
            chip.classList.add('show');
        } else {
            chip.classList.remove('show');
        }
    }

    function clearSelectedAttachment() {
        selectedAttachment = null;
        document.getElementById('attachment-input').value = '';
        document.getElementById('attachment-chip').classList.remove('show');
    }

    function updateOnlineStatus(isOnline) {
        const badge = document.getElementById('online-status');
        badge.textContent = isOnline ? 'Online' : 'Offline';
        badge.className = isOnline ? 'online-badge' : 'offline-badge';
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter' && canMessage) sendMessage();
    }

    function scrollToBottom() {
        const c = document.getElementById('messages-container');
        c.scrollTop = c.scrollHeight;
    }

    async function initializePage() {
        token = await window.ensureAuthenticated();
        if (!token) return;

        await loadOtherUserProfile();
        await loadMessages();
        connectDirectMessageSocket();
    }

    initializePage();
</script>
{% endblock %}
