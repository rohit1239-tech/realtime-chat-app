{% extends 'base.html' %}
{% block title %}Login — ChatApp{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    .auth-card {
        background: #1a1a2e;
        border: 1px solid #2a2a3d;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
    }
    .auth-logo {
        font-size: 32px;
        font-weight: 700;
        color: #6c63ff;
        text-align: center;
        margin-bottom: 8px;
    }
    .auth-subtitle {
        text-align: center;
        color: #888;
        margin-bottom: 32px;
        font-size: 14px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #aaa;
    }
    .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: #888;
    }
    .auth-footer a { color: #6c63ff; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">💬 ChatApp</div>
        <div class="auth-subtitle">Welcome back! Sign in to continue.</div>

        <div id="alert-box"></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="login()">
            Sign In
        </button>

        <div class="auth-footer">
            Don't have an account? <a href="/register/">Register</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // If already logged in redirect to chat
    if (localStorage.getItem('access_token')) {
        window.location.href = '/chat/';
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alert-box');

        if (!username || !password) {
            alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
            return;
        }

        try {
            const response = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                localStorage.setItem('username', username);
                window.location.href = '/chat/';
            } else {
                alertBox.innerHTML = '<div class="alert alert-error">Invalid username or password.</div>';
            }
        } catch (error) {
            alertBox.innerHTML = '<div class="alert alert-error">Something went wrong. Try again.</div>';
        }
    }

    // Allow Enter key to login
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>
{% endblock %}
