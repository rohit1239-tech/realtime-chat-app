{% extends 'base.html' %}
{% block title %}Login — ChatApp{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 28px;
        position: relative;
    }
    .auth-container::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at 16% 18%, rgba(78, 205, 196, 0.22), transparent 24%),
            radial-gradient(circle at 84% 16%, rgba(255, 138, 91, 0.18), transparent 22%);
        pointer-events: none;
    }
    .auth-shell {
        width: 100%;
        max-width: 480px;
        position: relative;
        z-index: 1;
    }
    .auth-brand {
        text-align: center;
        margin-bottom: 18px;
    }
    .auth-card {
        position: relative;
        background: linear-gradient(180deg, rgba(17, 34, 53, 0.88), rgba(8, 19, 31, 0.94));
        border: 1px solid var(--border-strong);
        border-radius: 28px;
        padding: 42px;
        width: 100%;
        box-shadow: var(--shadow-soft);
        overflow: hidden;
    }
    .auth-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 36%);
        pointer-events: none;
    }
    .auth-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 108px;
        height: 108px;
        border-radius: 32px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, rgba(78, 205, 196, 0.18), rgba(59, 167, 214, 0.12));
        border: 1px solid rgba(78, 205, 196, 0.14);
        color: #d9fbf7;
        box-shadow: var(--shadow-card);
    }
    .auth-logo-text {
        text-align: center;
        font-size: 30px;
        font-weight: 800;
        margin-bottom: 8px;
    }
    .auth-subtitle {
        text-align: center;
        color: var(--text-2);
        margin-bottom: 32px;
        font-size: 14px;
        line-height: 1.7;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: var(--text-2);
        font-weight: 600;
    }
    .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-3);
    }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 700; }
    .auth-card input::placeholder {
        color: var(--text-3);
    }
    .auth-card .btn-primary {
        width: 100%;
    }
    @media (max-width: 520px) {
        .auth-card {
            padding: 26px 20px;
        }
        .auth-logo {
            width: 94px;
            height: 94px;
            border-radius: 28px;
        }
        .auth-logo-text {
            font-size: 24px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-shell">
        <div class="auth-brand">
            <div class="auth-logo" aria-hidden="true">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.5 22.5C17.5 14.768 24.2158 8.5 32.5 8.5C40.7842 8.5 47.5 14.768 47.5 22.5C47.5 30.232 40.7842 36.5 32.5 36.5H30.3L22.5 43.5V35.4C19.4532 32.8161 17.5 27.9627 17.5 22.5Z" fill="white" stroke="#1C2126" stroke-width="3.2" stroke-linejoin="round"/>
                    <circle cx="26" cy="22.5" r="2.8" fill="#7E8892"/>
                    <circle cx="32.5" cy="22.5" r="2.8" fill="#7E8892"/>
                    <circle cx="39" cy="22.5" r="2.8" fill="#7E8892"/>
                </svg>
            </div>
            <div class="auth-logo-text">ChatApp</div>
        </div>

        <div class="auth-card">
            <div class="auth-subtitle">Welcome back! Sign in to continue.</div>

            <div id="alert-box"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button class="btn btn-primary" onclick="login()">
                Sign In
            </button>

            <div class="auth-footer" style="margin-top:12px">
                <a href="/auth/password_reset/" style="font-size:13px">
                    Forgot password?
                </a>
            </div>
            <div class="auth-footer">
                Don't have an account? <a href="/register/">Register</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // If already logged in redirect to chat
    if (localStorage.getItem('access_token')) {
        window.location.href = '/chat/';
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alert-box');

        if (!username || !password) {
            alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
            return;
        }

        try {
            const response = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                localStorage.setItem('username', username);
                window.location.href = '/chat/';
            } else {
                alertBox.innerHTML = `<div class="alert alert-error">${data.detail || 'Invalid username or password.'}</div>`;
            }
        } catch (error) {
            alertBox.innerHTML = '<div class="alert alert-error">Something went wrong. Try again.</div>';
        }
    }

    // Allow Enter key to login
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>
{% endblock %}
