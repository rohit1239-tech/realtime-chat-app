{% extends 'base.html' %}
{% block title %}Forgot Password — ChatApp{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    .auth-card {
        background: #1a1a2e;
        border: 1px solid #2a2a3d;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
    }
    .auth-logo {
        font-size: 32px;
        font-weight: 700;
        color: #6c63ff;
        text-align: center;
        margin-bottom: 8px;
    }
    .auth-subtitle {
        text-align: center;
        color: #888;
        margin-bottom: 32px;
        font-size: 14px;
        line-height: 1.6;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #aaa;
    }
    .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: #888;
    }
    .auth-footer a { color: #6c63ff; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">🔐 ChatApp</div>
        <div class="auth-subtitle">
            Forgot your password? Enter your email and
            we'll send you a reset link.
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">
                Send Reset Link
            </button>
        </form>

        <div class="auth-footer">
            Remember your password? <a href="/login/">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
