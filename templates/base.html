{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChatApp{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'brand/chatapp-logo.svg' %}">
    <link rel="shortcut icon" href="{% static 'brand/chatapp-logo.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #07111f;
            --bg-2: #0d1b2a;
            --panel: rgba(12, 25, 40, 0.84);
            --panel-strong: rgba(16, 32, 51, 0.94);
            --border: rgba(144, 177, 212, 0.16);
            --border-strong: rgba(144, 177, 212, 0.28);
            --text-1: #eff6ff;
            --text-2: #b7cae1;
            --text-3: #7f95af;
            --accent: #4ecdc4;
            --accent-2: #ff8a5b;
            --accent-soft: rgba(78, 205, 196, 0.16);
            --danger: #ff6b6b;
            --success: #41d39f;
            --shadow-soft: 0 24px 60px rgba(2, 12, 27, 0.34);
            --shadow-card: 0 16px 34px rgba(3, 10, 24, 0.28);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(78, 205, 196, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(255, 138, 91, 0.16), transparent 24%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
            color: var(--text-1);
            min-height: 100vh;
            letter-spacing: -0.01em;
        }
        .btn {
            padding: 11px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #3ba7d6);
            color: #04131f;
            box-shadow: 0 14px 30px rgba(78, 205, 196, 0.28);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(78, 205, 196, 0.34);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff7b7b, #ff5f5f);
            color: white;
        }
        input, textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(8, 20, 33, 0.88);
            color: var(--text-1);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input:focus, textarea:focus {
            border-color: rgba(78, 205, 196, 0.65);
            box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.12);
            background: rgba(7, 18, 29, 0.96);
        }
        .alert {
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 16px;
            font-size: 14px;
            backdrop-filter: blur(12px);
        }
        .alert-error { background: rgba(255, 107, 107, 0.12); color: #ff9c9c; border: 1px solid rgba(255, 107, 107, 0.34); }
        .alert-success { background: rgba(65, 211, 159, 0.12); color: #90f0c8; border: 1px solid rgba(65, 211, 159, 0.34); }
    </style>
    {% block extra_css %}{% endblock %}
</head>




<script>
function parseJwtPayload(token) {
    try {
        const payload = token.split('.')[1];
        if (!payload) return null;
        const base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
        const normalized = base64.padEnd(Math.ceil(base64.length / 4) * 4, '=');
        return JSON.parse(atob(normalized));
    } catch (err) {
        return null;
    }
}

function isTokenExpired(token, skewSeconds = 30) {
    const payload = parseJwtPayload(token);
    if (!payload?.exp) {
        return true;
    }
    const now = Math.floor(Date.now() / 1000);
    return payload.exp <= now + skewSeconds;
}

function redirectToLogin() {
    const target = '/login/';
    try {
        if (window.top && window.top !== window) {
            window.top.location.href = target;
            return;
        }
    } catch (err) {
        // Ignore cross-frame access issues and fall back locally.
    }
    window.location.href = target;
}

async function refreshToken(clearOnFailure = false) {
    const refresh = localStorage.getItem('refresh_token');
    if (!refresh) return null;

    try {
        const res = await fetch('/api/auth/login/refresh/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh })
        });
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('access_token', data.access);
            if (data.refresh) {
                localStorage.setItem('refresh_token', data.refresh);
            }
            return data.access;
        } else {
            if (clearOnFailure) {
                localStorage.clear();
            }
            return null;
        }
    } catch (err) {
        console.error('Token refresh failed:', err);
        if (clearOnFailure) {
            localStorage.clear();
        }
        return null;
    }
}

async function ensureAuthenticated() {
    const currentToken = localStorage.getItem('access_token');
    if (currentToken && !isTokenExpired(currentToken)) {
        return currentToken;
    }

    const refreshedToken = await refreshToken(true);
    if (refreshedToken) {
        return refreshedToken;
    }

    redirectToLogin();
    return null;
}

async function authFetch(url, options = {}, retryOnUnauthorized = true) {
    let accessToken = await ensureAuthenticated();
    if (!accessToken) {
        throw new Error('Authentication required.');
    }

    const headers = new Headers(options.headers || {});
    if (!headers.has('Authorization')) {
        headers.set('Authorization', `Bearer ${accessToken}`);
    }

    let response = await fetch(url, { ...options, headers });
    if (response.status !== 401 || !retryOnUnauthorized) {
        return response;
    }

    accessToken = await refreshToken(true);
    if (!accessToken) {
        redirectToLogin();
        throw new Error('Authentication expired.');
    }

    const retryHeaders = new Headers(options.headers || {});
    if (!retryHeaders.has('Authorization')) {
        retryHeaders.set('Authorization', `Bearer ${accessToken}`);
    }

    response = await fetch(url, { ...options, headers: retryHeaders });
    if (response.status === 401) {
        redirectToLogin();
        throw new Error('Authentication expired.');
    }

    return response;
}

window.refreshToken = refreshToken;
window.ensureAuthenticated = ensureAuthenticated;
window.authFetch = authFetch;
window.redirectToLogin = redirectToLogin;

function goBackOrFallback(fallbackUrl = '/chat/') {
    const referrer = document.referrer;
    const currentOrigin = window.location.origin;

    if (referrer && referrer.startsWith(currentOrigin)) {
        const referrerPath = new URL(referrer).pathname;
        const blockedPaths = ['/', '/login/', '/register/'];
        if (!blockedPaths.includes(referrerPath)) {
            window.history.back();
            return;
        }
    }

    window.location.href = fallbackUrl;
}

window.goBackOrFallback = goBackOrFallback;

// Only auto-refresh on protected pages, not on login/register
const currentPath = window.location.pathname;
const publicPages = ['/login/', '/register/', '/'];
if (!publicPages.includes(currentPath)) {
    setInterval(refreshToken, 50 * 60 * 1000);
}
</script>



<body>
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
